<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Memory Match</title>
<style>
body {
  margin: 0;
  background: #111;
  color: white;
  font-family: Arial;
  text-align: center;
}

#board {
  display: grid;
  grid-template-columns: repeat(4, 80px);
  grid-gap: 10px;
  justify-content: center;
  margin-top: 40px;
}

.card {
  width: 80px;
  height: 80px;
  background: #333;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  cursor: pointer;
  border-radius: 8px;
  user-select: none;
}

.card.flipped {
  background: #fff;
  color: black;
}

.card.matched {
  background: #2ecc71;
  color: white;
  cursor: default;
}
</style>
</head>
<body>

<h1>🧠 Memory Match</h1>
<p>Find all pairs!</p>

<div id="board"></div>

<script>
// emojis = memory cards
let symbols = ["🍎","🍌","🍇","🍒","🍉","🍓","🍍","🥝"];
let cards = [...symbols, ...symbols];

// shuffle
cards.sort(() => 0.5 - Math.random());

let board = document.getElementById("board");

let first = null;
let second = null;
let lock = false;
let matched = 0;

// create board
cards.forEach((symbol, index) => {
  let div = document.createElement("div");
  div.classList.add("card");
  div.dataset.symbol = symbol;
  div.dataset.index = index;
  div.innerText = "❓";

  div.addEventListener("click", () => {
    if(lock || div.classList.contains("matched") || div === first) return;

    div.classList.add("flipped");
    div.innerText = symbol;

    if(!first){
      first = div;
    } else {
      second = div;
      lock = true;

      if(first.dataset.symbol === second.dataset.symbol){
        first.classList.add("matched");
        second.classList.add("matched");
        matched += 2;

        reset();

        if(matched === cards.length){
          setTimeout(()=>alert("You win! 🎉"),300);
        }

      } else {
        setTimeout(() => {
          first.classList.remove("flipped");
          second.classList.remove("flipped");
          first.innerText = "❓";
          second.innerText = "❓";
          reset();
        }, 800);
      }
    }
  });

  board.appendChild(div);
});

function reset(){
  first = null;
  second = null;
  lock = false;
}
</script>

</body>
</html>
